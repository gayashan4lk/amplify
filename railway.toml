# Railway deployment config — T088.
#
# Two services: `web` (public Next.js, apps/web) and `api` (private
# FastAPI, apps/api). Per ADR-006 and the Constitution Technology &
# Security Constraints, only `web` is exposed publicly; `api` listens
# only on Railway's private network and is reached by `web` via
# `FASTAPI_INTERNAL_URL` with the `X-User-Id` header the web side
# derives from the authenticated BetterAuth session.

[[services]]
name = "web"
source = "apps/web"

[services.build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm prisma generate && pnpm build"

[services.deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# `web` is the only public-internet-reachable service.
[services.networking]
publicNetworking = true
privateNetworking = true

[services.env]
NODE_ENV = "production"
# FASTAPI_INTERNAL_URL must point at the private-network hostname of
# the `api` service, e.g. `http://api.railway.internal:8000`.
# DATABASE_URL, BETTER_AUTH_SECRET, BETTER_AUTH_URL,
# FASTAPI_INTERNAL_URL are set as service variables in the Railway UI.

[[services]]
name = "api"
source = "apps/api"

[services.build]
builder = "NIXPACKS"
buildCommand = "uv sync --frozen && uv run prisma generate"

[services.deploy]
startCommand = "uv run uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# `api` is private-network only — no public domain. The middleware in
# apps/api/middleware/auth.py enforces the X-User-Id trust boundary
# for every non-webhook request.
[services.networking]
publicNetworking = false
privateNetworking = true

[services.env]
PYTHON_ENV = "production"
LANGSMITH_TRACING = "true"
# DATABASE_URL, MONGODB_URI, REDIS_URL, OPENAI_API_KEY,
# ANTHROPIC_API_KEY, TAVILY_API_KEY, LANGSMITH_API_KEY,
# LANGSMITH_PROJECT are set as service variables in the Railway UI.
